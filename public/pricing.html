<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>价格 - AIX Cloud</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --border-color: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-primary); color: var(--text-primary); }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); padding: 16px 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
    .navbar-brand { font-size: 22px; font-weight: 700; color: var(--primary) !important; text-decoration: none; }
    .nav-link { color: var(--text-secondary) !important; font-weight: 500; padding: 8px 16px !important; border-radius: 8px; text-decoration: none; }
    .nav-link:hover, .nav-link.active { color: var(--text-primary) !important; background: var(--bg-secondary); }
    .btn-primary { background: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; color: white; text-decoration: none; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .page-header { padding: 140px 0 48px; text-align: center; }
    .page-header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 12px; }
    .page-header p { color: var(--text-secondary); font-size: 1.125rem; }
    .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 40px 0 80px; }
    .pricing-card { background: white; border: 1px solid var(--border-color); border-radius: 16px; padding: 32px; transition: all 0.3s; }
    .pricing-card:hover { border-color: var(--primary); box-shadow: 0 8px 30px rgba(99, 102, 241, 0.1); transform: translateY(-4px); }
    .pricing-card.featured { border-color: var(--primary); position: relative; }
    .pricing-card.featured::before { content: '最受欢迎'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 4px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .pricing-card h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; }
    .price { font-size: 2.5rem; font-weight: 700; margin-bottom: 4px; }
    .price span { font-size: 1rem; color: var(--text-secondary); font-weight: 400; }
    .price-desc { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }
    .features { list-style: none; padding: 0; margin-bottom: 24px; }
    .features li { color: var(--text-secondary); padding: 12px 0; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; }
    .features li:last-child { border: none; }
    .features i { color: var(--primary); }
    .btn { display: block; padding: 14px 24px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: 600; transition: all 0.3s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { border: 1px solid var(--border-color); color: var(--text-primary); }
    .btn-outline:hover { border-color: var(--primary); }
    footer { background: var(--bg-primary); border-top: 1px solid var(--border-color); padding: 40px 0; text-align: center; }
    footer p { color: var(--text-secondary); font-size: 14px; margin: 0; }
    @media (max-width: 768px) {
      .navbar .container { flex-wrap: wrap; }
      .navbar ul { flex-wrap: wrap; gap: 4px !important; justify-content: center; width: 100%; padding-top: 12px; }
      .page-header h1 { font-size: 1.75rem; }
      .page-header { padding: 120px 0 32px; }
      .pricing-grid { grid-template-columns: 1fr; }
      .pricing-card { padding: 24px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
      <a class="navbar-brand" href="/">AIX Cloud</a>
      <ul style="display:flex;gap:8px;list-style:none;margin:0;padding:0;">
        <li><a class="nav-link" href="/models">模型</a></li>
        <li><a class="nav-link" href="/chat">聊天</a></li>
        <li><a class="nav-link" href="/rankings">排行</a></li>
        <li><a class="nav-link active" href="/pricing">价格</a></li>
        <li><a class="nav-link" href="/docs">文档</a></li>
        <li><a class="nav-link" href="/login">登录</a></li>
        <li><a class="btn-primary" href="/login">开始使用</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>价格方案</h1>
      <p>灵活的价格方案，满足不同需求</p>
    </div>
  </div>

  <div class="container">
    <div class="pricing-grid">
      <div class="pricing-card">
        <h3>入门版</h3>
        <div class="price">¥0<span>/月</span></div>
        <div class="price-desc">免费试用</div>
        <ul class="features">
          <li><i class="bi bi-check"></i> 100 积分</li>
          <li><i class="bi bi-check"></i> 所有模型</li>
          <li><i class="bi bi-check"></i> 基础支持</li>
        </ul>
        <a href="/login" class="btn btn-outline">免费开始</a>
      </div>
      <div class="pricing-card featured">
        <h3>专业版</h3>
        <div class="price">¥99<span>/月</span></div>
        <div class="price-desc">适合个人开发者</div>
        <ul class="features">
          <li><i class="bi bi-check"></i> 10000 积分</li>
          <li><i class="bi bi-check"></i> 优先响应</li>
          <li><i class="bi bi-check"></i> API 支持</li>
        </ul>
        <a href="/login" class="btn btn-primary">立即订阅</a>
      </div>
      <div class="pricing-card">
        <h3>企业版</h3>
        <div class="price">¥999<span>/月</span></div>
        <div class="price-desc">适合企业用户</div>
        <ul class="features">
          <li><i class="bi bi-check"></i> 无限积分</li>
          <li><i class="bi bi-check"></i> 专属客服</li>
          <li><i class="bi bi-check"></i> 定制开发</li>
        </ul>
        <a href="/contact" class="btn btn-outline">联系我们</a>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>© 2026 AIX Cloud. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
