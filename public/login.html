<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - AIX Cloud</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --border-color: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
    }
    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--primary); }
    .login-header p { color: var(--text-secondary); font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--text-primary); }
    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
    }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .login-footer { text-align: center; margin-top: 24px; color: var(--text-secondary); font-size: 14px; }
    .login-footer a { color: var(--primary); text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }
    .tabs { display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 24px; }
    .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    @media (max-width: 480px) {
      .login-wrapper { padding: 24px 16px; margin: 16px; }
      .login-header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-header">
      <h1>AIX Cloud</h1>
      <p>统一大模型 API 平台</p>
    </div>
    
    <div class="tabs">
      <div class="tab active" data-tab="login">登录</div>
      <div class="tab" data-tab="register">注册</div>
    </div>

    <div class="tab-content active" id="login">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" class="form-control" id="loginEmail" required>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-control" id="loginPassword" required>
        </div>
        <button type="submit" class="btn-primary">登录</button>
      </form>
    </div>

    <div class="tab-content" id="register">
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" class="form-control" id="registerEmail" required>
        </div>
        <div class="form-group">
          <label class="form-label">验证码</label>
          <div style="display: flex; gap: 12px;">
            <input type="text" class="form-control" id="registerCode" required style="flex: 1;">
            <button type="button" class="btn-primary" id="sendCodeBtn" onclick="sendCode()" style="width: auto; padding: 12px 16px;">发送验证码</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-control" id="registerPassword" required>
        </div>
        <button type="submit" class="btn-primary">注册</button>
      </form>
    </div>

    <div class="login-footer">
      <p>登录即表示同意 <a href="/terms">服务条款</a> 和 <a href="/privacy">隐私政策</a></p>
    </div>
  </div>

  <script>
    const API_BASE = '';
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try {
        const res = await fetch(API_BASE + '/user/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('token', data.token);
          location.href = '/dashboard';
        } else {
          alert(data.error?.message || '登录失败');
        }
      } catch (err) { alert('登录失败'); }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const email = document.getElementById('registerEmail').value;
      const code = document.getElementById('registerCode').value;
      const password = document.getElementById('registerPassword').value;
      try {
        const res = await fetch(API_BASE + '/user/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code, password })
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('token', data.token);
          location.href = '/dashboard';
        } else {
          alert(data.error?.message || '注册失败');
        }
      } catch (err) { alert('注册失败'); }
    }

    async function sendCode() {
      const email = document.getElementById('registerEmail').value;
      if (!email) return alert('请输入邮箱');
      const btn = document.getElementById('sendCodeBtn');
      btn.disabled = true;
      let countdown = 60;
      const interval = setInterval(() => {
        btn.textContent = `${countdown}s`;
        countdown--;
        if (countdown < 0) {
          clearInterval(interval);
          btn.disabled = false;
          btn.textContent = '发送验证码';
        }
      }, 1000);
      await fetch(API_BASE + '/user/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
    }
  </script>
</body>
</html>
