<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型列表 - AIX Cloud</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --border-color: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body { font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-primary); color: var(--text-primary); margin: 0; }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); padding: 16px 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
    .navbar-brand { font-size: 22px; font-weight: 700; color: var(--primary) !important; text-decoration: none; }
    .nav-link { color: var(--text-secondary) !important; font-weight: 500; padding: 8px 16px !important; border-radius: 8px; transition: all 0.2s; text-decoration: none; }
    .nav-link:hover { color: var(--text-primary) !important; background: var(--bg-secondary); }
    .btn-primary { background: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; color: white; text-decoration: none; }
    .page-header { padding: 140px 0 60px; background: var(--bg-secondary); text-align: center; }
    .page-header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 12px; }
    .page-header p { color: var(--text-secondary); font-size: 1.125rem; }
    .model-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 40px 0; }
    .model-card { background: white; border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; transition: all 0.3s; display: flex; flex-direction: column; }
    .model-card:hover { border-color: var(--primary); box-shadow: 0 8px 30px rgba(99, 102, 241, 0.1); transform: translateY(-4px); }
    .model-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .model-icon { width: 48px; height: 48px; background: var(--bg-secondary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--primary); font-size: 18px; flex-shrink: 0; }
    .model-name { font-weight: 600; margin: 0; }
    .model-provider { color: var(--text-secondary); font-size: 14px; margin: 0; }
    .model-price { display: flex; gap: 16px; padding-top: 16px; border-top: 1px solid var(--border-color); font-size: 14px; color: var(--text-secondary); margin-top: auto; }
    footer { background: var(--bg-primary); border-top: 1px solid var(--border-color); padding: 40px 0; text-align: center; }
    footer a { color: var(--text-secondary); text-decoration: none; margin: 0 12px; }
    footer a:hover { color: var(--primary); }
    footer p { color: var(--text-secondary); font-size: 14px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">AIX Cloud</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/models">模型</a></li>
          <li class="nav-item"><a class="nav-link" href="/chat">聊天</a></li>
          <li class="nav-item"><a class="nav-link" href="/rankings">排行</a></li>
          <li class="nav-item"><a class="nav-link" href="/pricing">价格</a></li>
          <li class="nav-item"><a class="nav-link" href="/docs">文档</a></li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="/login">登录</a></li>
          <li class="nav-item"><a class="btn btn-primary" href="/login">开始使用</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>模型列表</h1>
      <p>探索 AIX Cloud 支持的顶尖 AI 模型</p>
    </div>
  </div>

  <div class="container">
    <div class="row g-4" id="featured-models"></div>
  </div>

  <footer>
    <div class="container">
      <p>© 2026 AIX Cloud. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
