<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 模型排行榜 - AIX Cloud</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --border-color: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-primary); color: var(--text-primary); }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); padding: 16px 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
    .navbar-brand { font-size: 22px; font-weight: 700; color: var(--primary) !important; text-decoration: none; }
    .nav-link { color: var(--text-secondary) !important; font-weight: 500; padding: 8px 16px !important; border-radius: 8px; text-decoration: none; }
    .nav-link:hover, .nav-link.active { color: var(--text-primary) !important; background: var(--bg-secondary); }
    .btn-primary { background: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; color: white; text-decoration: none; }
    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
    .page-header { padding: 140px 0 48px; text-align: center; }
    .page-header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 12px; }
    .page-header p { color: var(--text-secondary); font-size: 1.125rem; }
    .section-title { text-align: center; margin-bottom: 32px; }
    .section-title h2 { font-size: 1.5rem; font-weight: 600; color: var(--text-primary); }
    .model-list { background: white; border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; }
    .model-row { display: flex; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border-color); gap: 20px; }
    .model-row:last-child { border-bottom: none; }
    .model-row:hover { background: var(--bg-secondary); }
    .model-icon { width: 48px; height: 48px; background: var(--bg-secondary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--primary); font-size: 20px; flex-shrink: 0; }
    .model-info { flex: 1; }
    .model-name { font-weight: 600; font-size: 1.1rem; }
    .model-desc { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
    .model-price { text-align: right; }
    .price-label { font-size: 12px; color: var(--text-secondary); }
    .price-value { font-weight: 600; color: var(--text-primary); }
    .price-input { color: #059669; }
    .price-output { color: #dc2626; }
    footer { background: var(--bg-primary); border-top: 1px solid var(--border-color); padding: 40px 0; text-align: center; }
    footer p { color: var(--text-secondary); font-size: 14px; margin: 0; }
    @media (max-width: 768px) {
      .navbar .container { flex-wrap: wrap; }
      .navbar ul { flex-wrap: wrap; gap: 4px !important; justify-content: center; width: 100%; padding-top: 12px; }
      .page-header h1 { font-size: 1.75rem; }
      .page-header { padding: 120px 0 32px; }
      .model-row { flex-direction: column; align-items: flex-start; gap: 12px; }
      .model-icon { width: 40px; height: 40px; font-size: 16px; }
      .model-info { width: 100%; }
      .model-price { width: 100%; text-align: left; display: flex; gap: 16px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
      <a class="navbar-brand" href="/">AIX Cloud</a>
      <ul style="display:flex;gap:8px;list-style:none;margin:0;padding:0;">
        <li><a class="nav-link" href="/models">模型</a></li>
        <li><a class="nav-link" href="/chat">聊天</a></li>
        <li><a class="nav-link active" href="/rankings">排行</a></li>
        <li><a class="nav-link" href="/pricing">价格</a></li>
        <li><a class="nav-link" href="/docs">文档</a></li>
        <li><a class="nav-link" href="/login">登录</a></li>
        <li><a class="btn-primary" href="/login">开始使用</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>AIX 模型中心</h1>
      <p>AIX Cloud 提供的所有模型</p>
    </div>
  </div>

  <div class="container">
    <div class="section-title">
      <h2>全部模型</h2>
    </div>
    <div class="model-list" id="model-list"></div>
  </div>

  <footer>
    <div class="container">
      <p>© 2026 AIX Cloud. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function loadModels() {
      try {
        const res = await fetch('/v1/models');
        const data = await res.json();
        const models = data.data || [];
        
        const container = document.getElementById('model-list');
        
        if (models.length === 0) {
          container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">暂无模型数据</div>';
          return;
        }
        
        container.innerHTML = models.map(m => `
          <div class="model-row">
            <div class="model-icon">${m.id.charAt(0)}</div>
            <div class="model-info">
              <div class="model-name">${m.display_name || m.id}</div>
              <div class="model-desc">上下文 ${(m.context_length / 1000).toFixed(0)}K | ${m.supports_stream ? '支持流式' : '不支持流式'}</div>
            </div>
            <div class="model-price">
              <div class="price-label">输入</div>
              <div class="price-value price-input">$${parseFloat(m.pricing?.prompt || 0).toFixed(2)}/K</div>
              <div class="price-label" style="margin-top:8px;">输出</div>
              <div class="price-value price-output">$${parseFloat(m.pricing?.completion || 0).toFixed(2)}/K</div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load models:', e);
        document.getElementById('model-list').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">加载失败</div>';
      }
    }
    
    document.addEventListener('DOMContentLoaded', loadModels);
  </script>
</body>
</html>
