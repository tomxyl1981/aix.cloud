<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 模型排行榜 - AIX Cloud</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root { --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #818cf8; --light-bg: #f8fafc; --glass-bg: rgba(255,255,255,0.06); --glass-border: rgba(255,255,255,0.12); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; background: #ffffff; color: #e2e8f0; min-height: 100vh; }
    
    .navbar { background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border); padding: 1rem 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
    .navbar .container { display: flex; justify-content: space-between; align-items: center; }
    .navbar-brand { font-size: 1.5rem; font-weight: 700; color: #1e293b; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
    .navbar-brand span { background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: #94a3b8; text-decoration: none; font-weight: 500; transition: color 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: #1e293b; }
    .nav-actions { display: flex; gap: 1rem; align-items: center; }
    .btn { padding: 0.5rem 1.25rem; border-radius: 8px; font-weight: 500; text-decoration: none; transition: all 0.3s; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, var(--primary-light), var(--primary)); color: #1e293b; }
    .btn-primary:hover { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid var(--glass-border); }
    .btn-ghost:hover { background: var(--glass-bg); color: #1e293b; }

    .hero { padding: 8rem 0 4rem; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at top, rgba(99, 102, 241, 0.15) 0%, transparent 60%); pointer-events: none; }
    .hero h1 { font-size: 3rem; font-weight: 700; margin-bottom: 1rem; position: relative; }
    .hero h1 span { background: linear-gradient(135deg, var(--primary-light), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { font-size: 1.25rem; color: #94a3b8; max-width: 600px; margin: 0 auto 2rem; }
    .badge-reasoning { display: inline-flex; align-items: center; gap: 0.25rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
    
    .tabs { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; background: var(--glass-bg); padding: 0.5rem; border-radius: 12px; width: fit-content; margin: 0 auto 2rem; }
    .tab { padding: 0.75rem 1.5rem; border-radius: 8px; color: #94a3b8; cursor: pointer; transition: all 0.3s; border: none; background: transparent; font-size: 0.95rem; font-weight: 500; }
    .tab.active { background: var(--primary); color: #1e293b; }
    .tab:hover:not(.active) { color: #1e293b; }

    .leaderboard { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; backdrop-filter: blur(8px); }
    .leaderboard-header { display: grid; grid-template-columns: 80px 1fr 100px 120px 120px 120px 100px; gap: 1rem; padding: 1rem 1.5rem; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--glass-border); font-weight: 600; color: #94a3b8; font-size: 0.875rem; }
    .leaderboard-row { display: grid; grid-template-columns: 80px 1fr 100px 120px 120px 120px 100px; gap: 1rem; padding: 1rem 1.5rem; align-items: center; border-bottom: 1px solid var(--glass-border); transition: background 0.2s; }
    .leaderboard-row:hover { background: rgba(99, 102, 241, 0.1); }
    .leaderboard-row:last-child { border-bottom: none; }
    
    .rank { font-size: 1.25rem; font-weight: 700; }
    .rank-1 { color: #fbbf24; }
    .rank-2 { color: #94a3b8; }
    .rank-3 { color: #cd7f32; }
    
    .model-info { display: flex; align-items: center; gap: 1rem; }
    .model-logo { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.25rem; }
    .model-name { font-weight: 600; color: #1e293b; }
    .model-provider { font-size: 0.875rem; color: #64748b; }
    
    .score { font-weight: 600; color: #1e293b; }
    .score-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .score-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 3px; transition: width 0.5s ease; }
    
    .price { font-family: monospace; color: #10b981; }
    .speed { font-family: monospace; color: #60a5fa; }
    .badge-opensource { display: inline-flex; align-items: center; gap: 0.25rem; background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.75rem; }
    .badge-closed { color: #64748b; }

    .provider-openai { background: linear-gradient(135deg, #10a37f, #1a7f5a); }
    .provider-anthropic { background: linear-gradient(135deg, #d97706, #b45309); }
    .provider-google { background: linear-gradient(135deg, #4285f4, #1a73e8); }
    .provider-meta { background: linear-gradient(135deg, #0668e1, #0056b3); }
    .provider-deepseek { background: linear-gradient(135deg, #1e40af, #1e3a8a); }
    .provider-mistral { background: linear-gradient(135deg, #ff7300, #e65100); }
    .provider-alibaba { background: linear-gradient(135deg, #ff6a00, #e65100); }
    .provider-xai { background: linear-gradient(135deg, #000, #333); }
    .provider-nvidia { background: linear-gradient(135deg, #76b900, #5a9c00); }
    .provider-kimi { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
    .provider-minimax { background: linear-gradient(135deg, #ec4899, #db2777); }

    .footer { padding: 3rem 0; border-top: 1px solid var(--glass-border); margin-top: 4rem; text-align: center; color: #64748b; }
    .footer a { color: #94a3b8; text-decoration: none; }
    .footer a:hover { color: var(--primary-light); }
    
    @media (max-width: 768px) {
      .hero h1 { font-size: 2rem; }
      .nav-links { display: none; }
      .leaderboard-header, .leaderboard-row { grid-template-columns: 50px 1fr 60px; }
      .leaderboard-header > *:nth-child(n+4), .leaderboard-row > *:nth-child(n+4) { display: none; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand"><span>AIX</span> Cloud</a>
      <ul class="nav-links">
        <li><a href="/">首页</a></li>
        <li><a href="/models">模型</a></li>
        <li><a href="/pricing">价格</a></li>
        <li><a href="/docs">文档</a></li>
        <li><a href="/rankings" class="active">排行</a></li>
      </ul>
      <div class="nav-actions">
        <a href="/login" class="btn btn-ghost">登录</a>
        <a href="/register" class="btn btn-primary">开始使用</a>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="container">
      <h1>AI 模型<span>排行榜</span></h1>
      <p>基于权威基准测试的综合排名，看看哪些模型表现最佳</p>
    </div>
  </section>

  <div class="container">
    <div class="tabs">
      <button class="tab active" data-tab="intelligence">综合智能</button>
      <button class="tab" data-tab="coding">编程能力</button>
      <button class="tab" data-tab="reasoning">推理能力</button>
      <button class="tab" data-tab="price">性价比</button>
    </div>

    <div class="leaderboard">
      <div class="leaderboard-header">
        <span>排名</span>
        <span>模型</span>
        <span>国家</span>
        <span>智能指数</span>
        <span>速度</span>
        <span>价格</span>
        <span>开源</span>
      </div>
      <div id="leaderboard-body">
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 AIX Cloud. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const models = [
      { rank: 1, name: "GPT-5.4", provider: "OpenAI", providerClass: "provider-openai", country: "🇺🇸", openSource: false, intelligence: 98, speed: 125, inputPrice: 2.5, outputPrice: 10, reasoning: true },
      { rank: 2, name: "Claude Opus 4.6", provider: "Anthropic", providerClass: "provider-anthropic", country: "🇺🇸", openSource: false, intelligence: 97, speed: 85, inputPrice: 15, outputPrice: 75, reasoning: true },
      { rank: 3, name: "Gemini 3.1 Ultra", provider: "Google", providerClass: "provider-google", country: "🇺🇸", openSource: false, intelligence: 96, speed: 150, inputPrice: 1.25, outputPrice: 5, reasoning: true },
      { rank: 4, name: "DeepSeek V3", provider: "DeepSeek", providerClass: "provider-deepseek", country: "🇨🇳", openSource: true, intelligence: 94, speed: 180, inputPrice: 0.27, outputPrice: 1.1, reasoning: false },
      { rank: 5, name: "Llama 4 Maverick", provider: "Meta", providerClass: "provider-meta", country: "🇺🇸", openSource: true, intelligence: 93, speed: 200, inputPrice: 0.4, outputPrice: 0.8, reasoning: false },
      { rank: 6, name: "Grok 4", provider: "xAI", providerClass: "provider-xai", country: "🇺🇸", openSource: false, intelligence: 92, speed: 220, inputPrice: 5, outputPrice: 15, reasoning: true },
      { rank: 7, name: "Kimi K2.5", provider: "月之暗面", providerClass: "provider-kimi", country: "🇨🇳", openSource: false, intelligence: 91, speed: 140, inputPrice: 0.5, outputPrice: 2, reasoning: true },
      { rank: 8, name: "Mistral Large 3", provider: "Mistral", providerClass: "provider-mistral", country: "🇫🇷", openSource: false, intelligence: 90, speed: 160, inputPrice: 1, outputPrice: 3, reasoning: false },
      { rank: 9, name: "Qwen3", provider: "阿里云", providerClass: "provider-alibaba", country: "🇨🇳", openSource: true, intelligence: 89, speed: 190, inputPrice: 0.2, outputPrice: 0.6, reasoning: false },
      { rank: 10, name: "Nemotron 3 Super", provider: "NVIDIA", providerClass: "provider-nvidia", country: "🇺🇸", openSource: true, intelligence: 87, speed: 250, inputPrice: 0.6, outputPrice: 1.2, reasoning: true },
      { rank: 11, name: "MiniMax-M2.5", provider: "MiniMax", providerClass: "provider-minimax", country: "🇨🇳", openSource: false, intelligence: 86, speed: 170, inputPrice: 0.8, outputPrice: 2.5, reasoning: false },
      { rank: 12, name: "Claude Haiku 4.5", provider: "Anthropic", providerClass: "provider-anthropic", country: "🇺🇸", openSource: false, intelligence: 84, speed: 280, inputPrice: 0.8, outputPrice: 4, reasoning: false },
      { rank: 13, name: "Gemini Flash 2.0", provider: "Google", providerClass: "provider-google", country: "🇺🇸", openSource: false, intelligence: 82, speed: 350, inputPrice: 0.075, outputPrice: 0.3, reasoning: false },
      { rank: 14, name: "GPT-4o Mini", provider: "OpenAI", providerClass: "provider-openai", country: "🇺🇸", openSource: false, intelligence: 80, speed: 400, inputPrice: 0.15, outputPrice: 0.6, reasoning: false },
    ];

    function renderLeaderboard(filter = 'intelligence') {
      let sorted = [...models];
      
      if (filter === 'intelligence') {
        sorted.sort((a, b) => b.intelligence - a.intelligence);
      } else if (filter === 'coding') {
        sorted.sort((a, b) => (b.intelligence * (b.reasoning ? 1.2 : 1)) - (a.intelligence * (a.reasoning ? 1.2 : 1)));
      } else if (filter === 'reasoning') {
        sorted = sorted.filter(m => m.reasoning).sort((a, b) => b.intelligence - a.intelligence);
      } else if (filter === 'price') {
        sorted.sort((a, b) => (a.inputPrice + a.outputPrice) - (b.inputPrice + b.outputPrice));
      }

      const html = sorted.map((m, i) => `
        <div class="leaderboard-row">
          <span class="rank rank-${i + 1}">#${i + 1}</span>
          <div class="model-info">
            <div class="model-logo ${m.providerClass}">${m.name.charAt(0)}</div>
            <div>
              <div class="model-name">${m.name} ${m.reasoning ? '<span class="badge-reasoning"><i class="bi bi-lightbulb"></i> 推理</span>' : ''}</div>
              <div class="model-provider">${m.provider}</div>
            </div>
          </div>
          <span style="font-size: 1.5rem;">${m.country}</span>
          <div>
            <div class="score">${m.intelligence}</div>
            <div class="score-bar"><div class="score-fill" style="width: ${m.intelligence}%"></div></div>
          </div>
          <span class="speed">${m.speed} t/s</span>
          <span class="price">$${((m.inputPrice + m.outputPrice) / 2).toFixed(2)}/M</span>
          <span style="font-size: 1.25rem;">${m.openSource ? '🔓' : '🔒'}</span>
        </div>
      `).join('');

      document.getElementById('leaderboard-body').innerHTML = html;
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderLeaderboard(tab.dataset.tab);
      });
    });

    renderLeaderboard();
  </script>
</body>
</html>
