<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们 - AIX Cloud</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --border-color: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); padding: 16px 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
    .navbar-brand { font-size: 22px; font-weight: 700; color: var(--primary) !important; text-decoration: none; }
    .nav-link { color: var(--text-secondary) !important; font-weight: 500; padding: 8px 16px !important; border-radius: 8px; text-decoration: none; }
    .nav-link:hover, .nav-link.active { color: var(--text-primary) !important; background: var(--bg-secondary); }
    .btn-primary { background: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; color: white; text-decoration: none; }
    .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }
    .page-header { padding: 140px 0 48px; text-align: center; }
    .page-header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 12px; }
    .page-header p { color: var(--text-secondary); font-size: 1.125rem; }
    .contact-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin: 48px 0; }
    .contact-card { background: var(--bg-secondary); border-radius: 16px; padding: 32px 24px; text-align: center; }
    .contact-icon { width: 56px; height: 56px; background: white; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 24px; color: var(--primary); }
    .contact-card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
    .contact-card p { font-size: 14px; color: var(--text-secondary); margin: 0; }
    .form-section { background: var(--bg-secondary); border-radius: 16px; padding: 32px; margin-bottom: 48px; }
    .form-section h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 24px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--text-primary); }
    .form-control { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
    .form-textarea { min-height: 120px; resize: vertical; }
    .submit-btn { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 8px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; }
    .submit-btn:hover { background: var(--primary-dark); }
    footer { background: var(--bg-primary); border-top: 1px solid var(--border-color); padding: 40px 0; text-align: center; }
    footer p { color: var(--text-secondary); font-size: 14px; margin: 0; }
    @media (max-width: 768px) {
      .contact-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .navbar .container { flex-wrap: wrap; }
      .navbar ul { flex-wrap: wrap; gap: 4px !important; justify-content: center; width: 100%; padding-top: 12px; }
      .page-header h1 { font-size: 1.75rem; }
      .page-header { padding: 120px 0 32px; }
      .contact-grid { grid-template-columns: 1fr; }
      .form-section { padding: 20px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
      <a class="navbar-brand" href="/">AIX Cloud</a>
      <ul style="display:flex;gap:8px;list-style:none;margin:0;padding:0;">
        <li><a class="nav-link" href="/models">模型</a></li>
        <li><a class="nav-link" href="/chat">聊天</a></li>
        <li><a class="nav-link" href="/rankings">排行</a></li>
        <li><a class="nav-link" href="/pricing">价格</a></li>
        <li><a class="nav-link" href="/docs">文档</a></li>
        <li><a class="nav-link" href="/login">登录</a></li>
        <li><a class="btn-primary" href="/login">开始使用</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>联系我们</h1>
      <p>有任何问题？联系我们</p>
    </div>
  </div>

  <div class="container">
    <div class="contact-grid">
      <div class="contact-card">
        <div class="contact-icon"><i class="bi bi-envelope"></i></div>
        <h3>邮箱</h3>
        <p>contact@aix.cloud</p>
      </div>
      <div class="contact-card">
        <div class="contact-icon"><i class="bi bi-geo-alt"></i></div>
        <h3>地址</h3>
        <p>上海市陆家嘴</p>
      </div>
      <div class="contact-card">
        <div class="contact-icon"><i class="bi bi-chat-dots"></i></div>
        <h3>微信</h3>
        <p>搜索: aix-cloud</p>
      </div>
    </div>

    <div class="form-section">
      <h2>发送消息</h2>
      <form onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">消息</label>
          <textarea class="form-control form-textarea" required></textarea>
        </div>
        <button type="submit" class="submit-btn">发送</button>
      </form>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>© 2026 AIX Cloud. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function handleSubmit(e) {
      e.preventDefault();
      alert('感谢您的留言，我们会尽快回复！');
      e.target.reset();
    }
  </script>
</body>
</html>
